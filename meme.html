<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😂 Meme Generator | Vibe Coding Demo</title>
    <meta name="description" content="Create memes in the browser — built through vibe coding with Claude AI.">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>😂</text></svg>">
</head>

<body>

    <nav class="nav">
        <a href="index.html" class="nav-logo">⚡ VibeCode</a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="game.html">🎮 Game</a></li>
            <li><a href="music.html">🎵 Music</a></li>
            <li><a href="meme.html" class="active">😂 Memes</a></li>
            <li><a href="movies.html">🎬 Movies</a></li>
            <li><a href="demo.html">🚀 Live Demo</a></li>
        </ul>
    </nav>

    <main class="page">
        <div class="meme-container">
            <div class="section-header animate-in">
                <h2>😂 Meme Generator</h2>
                <p>Pick a background, add your text, download your masterpiece</p>
            </div>

            <div class="meme-workspace animate-in">
                <!-- Preview -->
                <div class="meme-preview">
                    <canvas id="meme-canvas" width="500" height="500"></canvas>
                    <div style="margin-top: var(--space-md); display: flex; gap: var(--space-sm);">
                        <button class="btn btn-primary" id="download-btn">⬇ Download Meme</button>
                        <button class="btn btn-secondary" id="random-btn">🎲 Random</button>
                    </div>
                </div>

                <!-- Sidebar Controls -->
                <div class="meme-sidebar">
                    <div class="meme-input-group">
                        <label>Background Style</label>
                        <div class="meme-templates" id="template-grid">
                            <!-- Generated by JS -->
                        </div>
                    </div>

                    <div class="meme-input-group">
                        <label>Top Text</label>
                        <input type="text" id="top-text" placeholder="TOP TEXT HERE" maxlength="60">
                    </div>

                    <div class="meme-input-group">
                        <label>Bottom Text</label>
                        <input type="text" id="bottom-text" placeholder="BOTTOM TEXT HERE" maxlength="60">
                    </div>

                    <div class="meme-input-group">
                        <label>Font Size</label>
                        <input type="range" id="font-size" min="20" max="60" value="36" style="width: 100%;">
                    </div>

                    <div class="meme-input-group">
                        <label>Text Color</label>
                        <select id="text-color">
                            <option value="white">White (Classic)</option>
                            <option value="yellow">Yellow</option>
                            <option value="cyan">Neon Cyan</option>
                            <option value="magenta">Hot Pink</option>
                            <option value="lime">Lime Green</option>
                        </select>
                    </div>

                    <div class="meme-input-group">
                        <label>Upload Your Own Image</label>
                        <input type="file" id="upload-image" accept="image/*" style="font-size: 0.85rem;">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/meme.js"></script>
</body>

</html>
