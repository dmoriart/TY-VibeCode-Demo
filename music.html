<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Beat Pad | Vibe Coding Demo</title>
    <meta name="description" content="Create beats with a drum machine built through vibe coding with Claude AI.">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
</head>

<body>

    <nav class="nav">
        <a href="index.html" class="nav-logo">⚡ VibeCode</a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="game.html">🎮 Game</a></li>
            <li><a href="music.html" class="active">🎵 Music</a></li>
            <li><a href="meme.html">😂 Memes</a></li>
            <li><a href="movies.html">🎬 Movies</a></li>
            <li><a href="demo.html">🚀 Live Demo</a></li>
        </ul>
    </nav>

    <main class="page">
        <div class="music-container">
            <div class="section-header animate-in">
                <h2>🥁 Beat Pad</h2>
                <p>Tap the pads to make sounds — all generated with code, no audio files!</p>
            </div>

            <!-- Pad Grid -->
            <div class="pad-grid animate-in" id="pad-grid">
                <!-- Pads are generated by JS -->
            </div>

            <!-- Sequencer -->
            <div class="sequencer-section glass-card animate-in">
                <h3>🔁 Step Sequencer</h3>
                <div class="sequencer-controls">
                    <button class="btn btn-primary" id="seq-play">▶ Play</button>
                    <button class="btn btn-secondary" id="seq-stop">⏹ Stop</button>
                    <button class="btn btn-secondary" id="seq-clear">✕ Clear</button>
                    <div class="tempo-control">
                        <label>Tempo</label>
                        <input type="range" id="tempo-slider" min="60" max="180" value="120">
                        <span class="tempo-value" id="tempo-display">120 BPM</span>
                    </div>
                </div>
                <div class="sequencer-grid" id="sequencer-grid">
                    <!-- Generated by JS -->
                </div>
            </div>
        </div>
    </main>

    <script src="js/music.js"></script>
</body>

</html>
